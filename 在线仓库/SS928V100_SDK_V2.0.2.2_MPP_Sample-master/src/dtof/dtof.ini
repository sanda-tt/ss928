[HistoProc];搜峰计算相关的配置参数
echoNum=2;支持的多峰检测峰的个数
kernalPost=72, 144, 212, 253, 212, 144, 72
downSampleRatio=2
sortNum=3
baseThRatio=10.0
peakThRatio=15.0
echoBinNumLth=2
echoBinNumHth=10
clopBinNum=18
pulseKeepTh=5
splitRatio=1
strongEchoValTh=3069.0
strongEchoHRatio=0.5
strongEchoBinTh=5
echoOrderType=1
ifFir=true
ifNoiseDic=false;直方图除噪声
maxEchoWidth=20;最大半高宽
fwhmThreshold=8.5
pseudorandomThreshold=100
noiseStartIdx=1
noiseEndIdx=62

[HistoInfo];直方图相关配置
spadWidth=40;sensor水平分辨率
spadHeight=30;sensor垂直分辨率
binNum=64;tdc bin个数，其中从0开始计数，有效数据为前62个，第62和第63寄存当前pixel打光次数
validBinNum=62;tdc有效数据个数
shotNumDesignNum=1024;打光次数设计值

[Process];深度计算算法调用相关配置
ifSpot=false;是否走选点分支（适配8*8模组）
thresholdProb=0.002;探测概率滤波阈值
spotNum=64
pointCouldFlag=true
distThreshold=10000;异常距离下限
probCoorThreshold=0.016;点阵信号探测概率阈值

[PileUpComp];pileup补偿相关参数
pileUpCompFlag=true;是否开启pileup补偿
distThresholdFar=2000.0;pileup远距离距离判断阈值
probCompNear=1.0
probCompFar=1.2
fwhmThresholdNear=5.5
overlapValNear=0.4
fwhmThresholdFar=4
overlapValFar=0.4
minFwhmVal=0;直方图半高宽的最小值0
maxFwhmVal=2000;直方图半高宽的最大值20.0

[ModeSwitch];启近远距离模式切换相关配置参数
configSwitchFlag=false;是否开启近远距离模式切换
nearPointNumThreFar=400;远距离时像素点判断阈值
nearPointNumThreNear=100;近距离时像素点判断阈值
minvalThre=1180;最小值点个数阈值
tdcTimeBinNear=500;近距离tdc配置
tdcTimeBinFar=1000;远距离tdc配置
totalShotNumNear=30000;近距离打光次数
totalShotNumFar=30000;远距离打光次数
distThreshold=2000.0;远近距离切换阈值

[TemperatureCoef]
tempCompensateFlag=true;温漂补偿开关
temperatureBypass=false;false：读eeprom温漂系数   true:读本文件温漂系数
minTemperature=-20.0
maxTemperature=85.0
tempCompFlag=true;
tempComp=0.25;
tempCompMax=20.0;

[TemperatureCoefNear]
temperatureOne=-20
temperatureCoefOneA=-0.002628
temperatureCoefOneB=-2.410438
temperatureCoefOneC=13.519029
temperatureTwo=20
temperatureCoefTwoA=-0.007910
temperatureCoefTwoB=-2.294792
temperatureCoefTwoC=13.076182
temperatureThree=60
temperatureCoefThreeA=-0.007896
temperatureCoefThreeB=-2.215872
temperatureCoefThreeC=8.069568
temperatureFour=85

[TemperatureCoefFar]
temperatureOne=-20
temperatureCoefOneA=-0.003215
temperatureCoefOneB=-2.354452
temperatureCoefOneC=11.344553
temperatureTwo=20
temperatureCoefTwoA=-0.007795
temperatureCoefTwoB=-2.166053
temperatureCoefTwoC=8.517431
temperatureThree=60
temperatureCoefThreeA=-0.009207
temperatureCoefThreeB=-2.045675
temperatureCoefThreeC=5.165042
temperatureFour=85

[SharpenFilter];散射去飞点算法相关参数
kernelSize=3;卷积核kernel大小
sharpenFactor=0.1;局部散射矫正系数
globalScattFactor=0.1;全局散射矫正系数
shotNumOffsetMax=2;散射矫正打光次数补偿最大补偿系数
thresholdShotNumFactor=0.67;散射矫正打光次数补偿统计区域的阈值
thresholdBuffMax=1023;卷积核计算有效数据判断阈值
sharpenFlag=true;散射去飞点算法开关

[DepthDomain]
maxDeltaDepth=100;相邻深度差阈值
comFilterThreshold=10;输出的连通域大小阈值，比阈值大才会按照距离远近排序
maxDistanceClose=10;大于该距离（单位mm）选用maxPixelCountFar，反之选用maxPixelCountClose
maxPixelCountClose=20;近距离下连通域阈值，小于该值会被当成噪声过滤掉
maxPixelCountFar=10;远距离下连通域阈值，小于该值会被当成噪声过滤掉
depthDomainFlag=true;连通域算法开关

[KillFlyingPixels]
threshold=0.05;去飞点阈值
maxDistance=20000;去飞点算法启用的最大距离，大于该值则不进行去飞点滤波
killFlyingFlag=true;去飞点滤波算法开关

[TimeFilter]
weight=10.0;时域滤波权重值，用来调整时域滤波强弱
timeFilterFlag=true;时域滤波算法开关

[LogEvent];日志功能选项，可与选择不显示日志、打印错误日志、打印关键日志和寄存离线数据等功能
logEvent=0;0: LOG_DEFAULT, 1: LOG_DEBUG, 2: LOG_SAVE
saveFilePath=./data;存图路径
maxFileNum=10;最大存图帧数
