# ***************************Common************************** #
[Default]
Port = 4321
UartEn = 0
UartDev = /dev/ttyAMA0

[iniserver]
Port = 2333

[PRINT]
# DBG_EMERG      0   /* system is unusable                   */
# DBG_ALERT      1   /* action must be taken immediately     */
# DBG_CRIT       2   /* critical conditions                  */
# DBG_ERR        3   /* error conditions                     */
# DBG_WARN       4   /* warning conditions                   */
# DBG_NOTICE     5   /* normal but significant condition     */
# DBG_INFO       6   /* informational                        */
# DBG_DEBUG      7
PrintLevel = 5

[UseXVR]
xvr = 0

[VO]
enable = 1

[Use3A]
3a = 1

[UseLibrary]
AE = ./libs/libss_ae.so
AWB = ./libs/libss_awb.so
# Only the frame-making function of the dpu needs to depend on the library, and the absence of it will not affect the normal use of functions
Depth_MarkObstacle_En = 0
Depth_MarkObstacle_Lib = ./libs/libdepth_dfx_mark.so

[FPNSaveRaw]
enable = 0
Path = ./


[JPEG]
JpegChn = 15

[Other]
RawExtraInfo = 0

[key]
GroupNum = 0
BitNum = 0
[led]
GroupNum = 5
BitNum = 0

# ***************************Start_Mode*************************** #
[Method]
# 0:PC trigger send to PC; 1:PC trigger save to disk; 2:auto save to disk; 3:auto load raw from disk; 4:auto load yuv from disk
Method = 0

# Option 0:write direct ;Option 1:use VB     
Option = 1 

# mnt path of disk,only for method 1 and 2    
Path = ./

# When file size exceeds SplitSize(MByte), the program will slip the file. 0 means never slip file.    
SplitSize = 1024  

# for method 2/3/4 start dump after how many minutes 
DelayTime = 0

# only for method 2;  ;0: YUV Image; 1:RAW Image; 2:Stream Image      
Image = 0

# Also save a RAW or YUV data file with ISP information          
SaveIspInfo = 0    

# dump times, supported Raw_Image/Yuv_Image/Stream_Image
DumpTimes = 1

[Module]
videv = 0
vipipe = 0
vichn = 0
vpssgrp = 0
vpsschn = 0
avsgrp = 0
vencchn = 0
# ************ switch the stream capture of dis or normal******* #
bDisStream = 0
vencDisOn = 0
vencDisOff = 1
# ************ switch the raw capture of dis or normal******* #
bDisRaw = 0
# ************ switch motionsensor******* #
GYRO = 0

# **************************Auto_dump_raw_yuv_stream********************* #
[OutPutPath]
path = ./
# Route,Raw_Image, Yuv_Image same to [PQ Capture Tool], only for method 2
[Raw_Image]
RAW_bit = 12

# 0 PQ_MULTIPLE_BASE; 1 PQ_MULTIPLE_AVS; 2 PQ_MULTIPLE_MULTI; 3 PQ_MULTIPLE_MCFCAL; 4 PQ_MULTIPLE_DPU_MATCH; 5 PQ_MULTIPLE_BUTT;
# auto dump just support 1 PQ_MULTIPLE_AVS and 5 PQ_MULTIPLE_BUTT; the 5 is used by line mode.
StitchFlag = 5

# Mode 0:Linear; Mode 1:WDR(VCNum0); Mode 2:WDR(VCNum1); Mode 3:WDR(VCNum2); Mode 4:WDR(VCNum3); Mode 5:WDR(2in1); Mode 6:WDR(3in1); Mode 7:WDR(4in1); 
Mode = 0

# Frames=0 dump till power off or disk full           
Frames = 1

[Yuv_Image]
# 0:VI; 1:VPSS
Capture_from = 1
  
# Frames=0 dump till power off or disk full 
Frames = 1   

# 0 PQ_MULTIPLE_BASE; 1 PQ_MULTIPLE_AVS; 2 PQ_MULTIPLE_MULTI; 3 PQ_MULTIPLE_MCFCAL; 4 PQ_MULTIPLE_DPU_MATCH; 5 PQ_MULTIPLE_BUTT;
# auto dump just support 1 PQ_MULTIPLE_AVS and 5 PQ_MULTIPLE_BUTT; the 5 is used by line mode.
StitchFlag = 5

[Stream_Image]
# Frames must be greater than 0
Frames = 100

[Auto_Load]
Loop = 0

# 0 PQ_MULTIPLE_BASE; 1 PQ_MULTIPLE_AVS; 2 PQ_MULTIPLE_MULTI; 3 PQ_MULTIPLE_MCFCAL; 4 PQ_MULTIPLE_DPU_MATCH; 5 PQ_MULTIPLE_BUTT;
# auto load just support 1 PQ_MULTIPLE_AVS and 5 PQ_MULTIPLE_BUTT; the 5 is used by line mode.
StitchFlag = 5
SrcPath = ./
DestImagePath = ./
SaveType = 0       # SaveType 0:save none; SaveType 1:save yuv; SaveType 2:save h264/h265; 

[Raw_Load]
RawSource = 1      # RawSource 0: FE;  RawSource 1:USER
ReadyFrames = 60
WithIspInfo = 0
# NonCompact  0 Compact; 1 NonCompact;
NonCompact = 0
# WaitFeIntCnt: Wait fe-start interrupt after set ispinfo before send raw.
WaitFeIntCnt = 10
# WithBlackLevel: black level setting switch. 0 is disable, 1 is enable.
WithBlackLevel = 0
# BlackLevel Data From: 0 is config.cfg; 1 is RawFileName.txt
BlackDataFrom = 0
BlackLevel_R = 240
BlackLevel_Gr = 240
BlackLevel_Gb = 240
BlackLevel_B = 240
# bLongFrameFirst: 0:keep origin, 1:Change the WDR Raw insert order
WdrLongfirst = 0

[Yuv_Load]
# YuvSource 0: VI;  YuvSource 1:VPSS YuvSource 2: AVS YuvSource 3: VENC 
YuvSource = 1
# enPixelType  planner420 = 1; semi-planner420 = 3
enPixelType = 3

