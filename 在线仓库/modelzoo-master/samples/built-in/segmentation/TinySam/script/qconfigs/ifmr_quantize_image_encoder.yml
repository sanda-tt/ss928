# Layer name not to be quantized
skip_layers: []

# By default, global quantization is disabled, and only CUBE quantization is turned on.
common_config:
  {
    quant_enable: False,
    weight_quant_params:
      {
        quantizer: "ArqWeightFakeQuantize"
      },
    activation_quant_params:
      {
        quantizer: "UlqFakeQuantize"
      }
  }

# layer config by types user defined for overriding
override_layer_types:
  [
    {
      layer_type: "torch.nn.Linear",
      weight_quant_params:
        {
          quantizer: "ArqWeightFakeQuantize",
          quantizer_args:
            {
              num_bits: 16,
              observer: "ArqObserver",
              channel_wise: False
            }
        },
      activation_quant_params:
        {
          quantizer: "UlqFakeQuantize",
          quantizer_args:
            {
              observer: "IFMRObserver",
              num_bits: 8,
              batch_num: 16
            }
        }
    },
    {
      layer_type: ["torch.nn.Conv2d", "torch.nn.ConvTranspose2d"],
      weight_quant_params:
        {
          quantizer: "ArqWeightFakeQuantize",
          quantizer_args:
            {
              observer: "ArqObserver",
              num_bits: 8,
              channel_wise: true
            }
        },
      activation_quant_params:
        {
          quantizer: "UlqFakeQuantize",
          quantizer_args:
            {
              observer: "IFMRObserver",
              num_bits: 8,
              batch_num: 16
            }
        }
    },
    {
      layer_type: ["torch.nn.AdaptiveAvgPool2d", "torch.nn.AdaptiveMaxPool2d",
                   "torch.nn.AvgPool2d", "torch.nn.MaxPool2d"],
      activation_quant_params:
        {
          quantizer: "UlqFakeQuantize",
          quantizer_args:
            {
              observer: "IFMRObserver",
              num_bits: 8,
              batch_num: 16
            }
        }
    },
    {
      layer_type: ["torch.matmul", "operator.matmul", "matmul"],
      activation_quant_params:
        {
          quantizer: "LuqActivationFakeQuantize",
          quantizer_args:
            {
              observer: "IFMRObserver",
              num_bits: 8,
              batch_num: 16,
              qscheme: "symmetric", # qscheme should be symmetric for matmul node
              with_offset: False, # with_offset be false to keep IFMRObserver symmetric
            }
        }
    }
  ]

# layer config user defined for overridingoverride_layer_configs:
override_layer_configs:
  [
    {
      layer_name: ['layers_0_blocks_0_conv2_c', 'layers_0_blocks_1_conv2_c',
                   'layers_0_downsample_conv2_c', 'layers_2_downsample_conv2_c'],
      weight_quant_params:
        {
          quantizer: "ArqWeightFakeQuantize",
          quantizer_args:
            {
              observer: "ArqObserver",
              num_bits: 8,
              channel_wise: false
            }
        },
      activation_quant_params:
        {
          quantizer: "UlqFakeQuantize",
          quantizer_args:
            {
              num_bits: 16,
              batch_num: 16,
              observer: "IFMRObserver",
            }
        }
    }
  ]